// ---------------------------------------------------------------------------
// Scenario Tree
// ---------------------------------------------------------------------------
(function renderTree(){
  const rounds=D.rounds;
  const forks=D.forks||[];
  const hasFork=forks.length>0;
  function tipStr(parts){return parts.filter(Boolean).map(esc).join('&#10;');}

  const W=920;
  const forkRowH=55;
  const forkStartY=hasFork?238:null;
  const forkRowY=fi=>forkStartY+fi*forkRowH;
  const H=hasFork?(forks.length<=1?320:forkStartY+(forks.length-1)*forkRowH+45):240;
  const mainY=hasFork?138:120;
  const altY=50;

  const startX=80;
  const colW=(W-210)/Math.max(rounds.length,1);
  const roundXs=rounds.map((_,i)=>Math.round(startX+(i+1)*colW));

  // SVG helpers
  function line(x1,y1,x2,y2,color,w,dash,marker){
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${w}"${dash?` stroke-dasharray="${dash}"`:''}${marker?` marker-end="url(#${marker})"`:''}/>`;
  }
  function circ(x,y,r,fill,stroke,sw,dash){
    return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="${stroke||'white'}" stroke-width="${sw||2}"${dash?` stroke-dasharray="${dash}"`:''}/>`;
  }
  function txt(x,y,text,color,size,bold){
    return `<text x="${x}" y="${y}" text-anchor="middle" fill="${color}" font-size="${size}"${bold?' font-weight="700"':''}>${esc(text)}</text>`;
  }
  function shortSvg(s,chars){const t=String(s||'');return t.length>chars?t.slice(0,chars)+'…':t;}

  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0L0,6L8,3z" fill="#2563eb"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0L0,6L8,3z" fill="#7c3aed"/></marker>
  </defs>`;

  // Row labels
  s+=txt(18,mainY+3,'MAIN','#2563eb',9,true);
  if(hasFork)forks.forEach((_,fi)=>s+=txt(18,forkRowY(fi)+3,forks.length>1?`F${fi+1}`:'FORK','#7c3aed',9,true));
  s+=txt(18,altY+3,'ALT','#94a3b8',9,true);

  // START node
  s+=`<g class="tree-node" data-tip="${tipStr([D.title,'Start: '+D.start_year])}">`;
  s+=circ(startX,mainY,18,'#1e3a5f','white',2);
  s+=txt(startX,mainY-3,'START','white',8,true);
  s+=txt(startX,mainY+8,String(D.start_year),'rgba(255,255,255,.7)',7,false);
  s+=`</g>`;

  // Fork lookup: which rounds have fork divergences?
  const forkRoundSet=new Set(forks.map(f=>f.fork_round).filter(Boolean));

  // Main path + alt branches + fork starts
  let prevX=startX;
  for(let i=0;i<rounds.length;i++){
    const r=rounds[i];
    const x=roundXs[i];
    const R=22;

    // Edge to this node
    s+=line(prevX+(i===0?18:R),mainY,x-R,mainY,'#2563eb',2.5,null,'ab');

    // Main node
    const selB=r.branches&&r.branches[r.selected_branch_index];
    s+=`<g class="tree-node tree-node-nav" data-nav="round-${r.number}" data-tip="${tipStr(['Round '+r.number+' · '+(r.year||''),selB&&selB.axis?'Axis: '+selB.axis:'',selB&&selB.resolution?'Resolution: '+selB.resolution:'','→ Click to view details'])}">`;
    s+=circ(x,mainY,R,'#2563eb','white',2.5);
    s+=txt(x,mainY-5,`R${r.number} ✓`,'white',8,true);
    if(selB)s+=txt(x,mainY+6,shortSvg(selB.axis,14),'rgba(255,255,255,.85)',6.5,false);
    s+=`</g>`;

    // Year label
    const resYear=(r.year||D.start_year)+(D.resolution_years||5);
    s+=txt(x,18,`→ ${resYear}`,'#64748b',10,false);

    // Alt branches (non-selected) — skip at fork point; fork is shown below
    const isForkPt=forkRoundSet.has(r.number);
    const altBs=(r.branches||[]).filter(b=>!b.selected);
    if(altBs.length>0&&!isForkPt){
      const altB=altBs[0];
      s+=line(x,mainY-R,x,altY+16,'#94a3b8',1.5,'5,3');
      s+=`<g class="tree-node tree-node-nav" data-nav="round-${r.number}" data-tip="${tipStr(['Counterfactual (not selected)','Axis: '+altB.axis,altB.resolution?'Resolution: '+altB.resolution:'','→ Click to view round branches'])}">`;
      s+=circ(x,altY,16,'white','#94a3b8',1.5,'4,2');
      s+=txt(x,altY-3,'Alt','#94a3b8',8,false);
      s+=txt(x,altY+8,shortSvg(altB.axis,12),'#94a3b8',6.5,false);
      s+=`</g>`;
    }

    // Fork start nodes — one per fork that diverges at this round
    if(hasFork&&isForkPt){
      forks.forEach((fork,fi)=>{
        if(fork.fork_round!==r.number)return;
        const fy=forkRowY(fi);
        s+=line(x,mainY+R,x,fy-18,'#7c3aed',1.5,'5,3');
        s+=`<g class="tree-node tree-node-nav" data-nav="fork-${fi}-round-${r.number}" data-tip="${tipStr(['Fork '+(fi+1)+' · Round '+r.number+(r.year?' · '+r.year:''),'Axis: '+(fork.branch_axis||''),fork.branch_resolution?'Resolution: '+fork.branch_resolution:'','→ Click for fork details'])}">`;
        s+=circ(x,fy,18,'#7c3aed','white',2);
        s+=txt(x,fy-4,forks.length>1?`F${fi+1}`:'F-R'+r.number,'white',8,true);
        s+=txt(x,fy+6,shortSvg(fork.branch_axis||'',12),'rgba(255,255,255,.8)',6,false);
        s+=`</g>`;
      });
    }

    prevX=x;
  }

  // Fork continuation rounds — one path per fork
  if(hasFork){
    forks.forEach((fork,fi)=>{
      const fy=forkRowY(fi);
      const forkRoundsByN={};
      (fork.rounds||[]).forEach(fr=>forkRoundsByN[fr.number]=fr);
      const forkStartIdx=rounds.findIndex(r=>r.number===fork.fork_round);
      let prevFX=forkStartIdx>=0?roundXs[forkStartIdx]:startX;
      for(let i=0;i<rounds.length;i++){
        const mainR=rounds[i];
        if(mainR.number<=fork.fork_round)continue;
        const x=roundXs[i];
        s+=line(prevFX+18,fy,x-18,fy,'#7c3aed',2,null,'ap');
        const fr=forkRoundsByN[mainR.number];
        const fSelB=fr&&fr.branches&&fr.branches[fr.selected_branch_index];
        s+=`<g class="tree-node tree-node-nav" data-nav="fork-${fi}-round-${mainR.number}" data-tip="${tipStr(['Fork '+(fi+1)+' Round '+mainR.number+(fr&&fr.year?' · '+fr.year:''),fSelB&&fSelB.axis?'Axis: '+fSelB.axis:'',fSelB&&fSelB.resolution?'Resolution: '+fSelB.resolution:'','→ Click for fork details'])}">`;
        s+=circ(x,fy,18,'#7c3aed','white',2);
        s+=txt(x,fy-4,`F${fi+1}-R${mainR.number} ✓`,'white',7,true);
        if(fSelB)s+=txt(x,fy+6,shortSvg(fSelB.axis,12),'rgba(255,255,255,.8)',6,false);
        s+=`</g>`;
        prevFX=x;
      }
    });
  }

  // Outcome labels (right side)
  const lastX=roundXs[roundXs.length-1];
  const endYear=D.start_year+(D.resolution_years||5)*D.rounds_completed;
  if(lastX+40<W){
    s+=txt(lastX+38,mainY-5,`${endYear} Main`,'#1e3a5f',10,true);
    const fs=D.final_scenario||{};
    const fsBranch=(fs.branch||{});
    s+=txt(lastX+38,mainY+8,shortSvg(fsBranch.axis||'',18),'#374151',8,false);
    if(hasFork){
      forks.forEach((fork,fi)=>{
        const fy=forkRowY(fi);
        s+=txt(lastX+38,fy-4,forks.length>1?`${endYear} F${fi+1}`:`${endYear} Fork`,'#5b21b6',10,true);
        const ffS=(fork.overview&&fork.overview.final_scenario&&fork.overview.final_scenario.branch)||{};
        s+=txt(lastX+38,fy+7,shortSvg(ffS.axis||'',18),'#4c1d95',8,false);
      });
    }
  }

  // Year at start
  s+=txt(startX,18,String(D.start_year),'#64748b',10,false);

  s+='</svg>';

  const legendItems=[
    {color:'#2563eb',label:'Selected / main path'},
    ...(hasFork?[{color:'#7c3aed',label:'Fork run path'}]:[]),
    {color:null,label:'Counterfactual (not taken)',dash:true},
  ];

  let legend='<div class="tree-legend">';
  legendItems.forEach(li=>{
    if(li.dash){
      legend+=`<div class="leg-item"><div class="leg-dot" style="border:2px dashed #94a3b8;background:white"></div>${esc(li.label)}</div>`;
    } else {
      legend+=`<div class="leg-item"><div class="leg-dot" style="background:${li.color}"></div>${esc(li.label)}</div>`;
    }
  });
  legend+='</div>';

  document.getElementById('s-tree-container').innerHTML=
    `<div class="tree-wrap">${s}${legend}<p style="font-size:12px;color:var(--muted);margin-top:12px">Solid = selected. Dashed = counterfactual. Hover for details. Click nodes to navigate.</p></div>`;

  // Tooltip wiring — getTip() is lazy so DOM order doesn't matter
  (function(){
    const svgEl=document.querySelector('#s-tree-container svg');
    if(!svgEl)return;
    function getTip(){return document.getElementById('tree-tip');}
    svgEl.addEventListener('mousemove',e=>{
      const g=e.target.closest('g[data-tip]');
      const tipEl=getTip();
      if(!tipEl)return;
      if(g&&g.dataset.tip){
        tipEl.textContent=g.dataset.tip;
        tipEl.style.display='block';
        tipEl.style.left=Math.min(e.clientX+14,window.innerWidth-320)+'px';
        tipEl.style.top=Math.max(e.clientY-20,8)+'px';
      } else {
        tipEl.style.display='none';
      }
    });
    svgEl.addEventListener('mouseleave',()=>{
      const tipEl=getTip();
      if(tipEl)tipEl.style.display='none';
    });
    svgEl.addEventListener('click',e=>{
      const g=e.target.closest('g[data-nav]');
      if(!g)return;
      const nav=g.dataset.nav;
      if(nav&&nav.startsWith('round-')){
        const n=parseInt(nav.split('-')[1]);
        activateTab('s-rounds');
        showRound(n);
      } else if(nav&&nav.startsWith('fork-')){
        const parts=nav.split('-');
        const fi=parseInt(parts[1]);
        const n=parseInt(parts[3]);
        activateTab('s-fork');
        showForkSel(fi);
        showFP(fi,'frp-'+fi+'-'+n);
      }
    });
  })();
})();

// ---------------------------------------------------------------------------
// Rounds
// ---------------------------------------------------------------------------
(function renderRounds(){
  const container=document.getElementById('s-rounds');

  if(D.rounds.length>1){
    let snav='<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">';
    D.rounds.forEach((r,i)=>{
      snav+=`<button class="dom-tab${i===0?' active':''}" data-round-btn="${r.number}" onclick="showRound(${r.number})">Round ${r.number}${r.year?' · '+r.year:''}</button>`;
    });
    snav+='</div>';
    container.insertAdjacentHTML('beforeend',snav);
  }

  D.rounds.forEach((r,ri)=>{
    const forks=D.forks||[];
    const isForkRound=forks.some(f=>f.fork_round===r.number);

    let h=`<div id="rp-${r.number}" data-round-panel="${r.number}" ${ri>0?'style="display:none"':''}>`;

    // Round header
    const selectedB=r.branches&&r.branches[r.selected_branch_index];
    const selAxis=selectedB?selectedB.axis:'';
    h+=`<div class="rnd-hdr">
      <span class="yr-badge">${r.year}</span>
      <h2>Round ${r.number}</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:4px">Uncertainty axis resolved: <strong>${esc(selAxis)}</strong></p>
    </div>`;

    // Key decisions
    if(r.key_decisions&&r.key_decisions.length){
      h+=`<div class="card"><h3>Key Decisions</h3><ul class="dec-list">`;
      r.key_decisions.forEach(d=>{
        h+=`<li class="dec-item">
          <div class="dec-id">${esc(d.id)}</div>
          <div class="dec-txt">${esc(d.description)}</div>
          <div class="dec-by">${esc(d.decided_by)}</div>
        </li>`;
      });
      h+=`</ul></div>`;
    }

    // Branches
    if(r.branches&&r.branches.length){
      h+=`<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:11px">Scenario Branches</h3>`;
      h+=`<div class="branches">`;
      r.branches.forEach((b,bi)=>{
        const isForkB=isForkRound&&!b.selected&&forks.some(f=>f.branch_axis===b.axis);
        const cls=b.selected?'branch selected':isForkB?'branch fork-b':'branch';
        const narId=`narr-r${r.number}-b${bi}`;
        h+=`<div class="${cls}">`;
        if(b.selected) h+=`<span class="sel-badge">SELECTED ✓</span>`;
        else if(isForkB) h+=`<span class="fork-badge">FORK ↗</span>`;
        h+=`<div class="bl ${b.selected?'bl-sel':isForkB?'bl-fork':'bl-alt'}">${b.selected?'Carried Forward':isForkB?'Fork Branch':'Not Selected'}</div>`;
        h+=`<div class="b-axis">${esc(b.axis)}</div>`;
        h+=`<div class="b-res">${esc(b.resolution)}</div>`;
        if(b.scenario_narrative){
          h+=`<div class="b-narr" id="${narId}">${esc(b.scenario_narrative)}</div>`;
          h+=`<button class="exp-btn" onclick="toggleNarr('${narId}',this)">Read more ▾</button>`;
        }
        const changes=(b.key_changes||[]);
        if(changes.length){
          h+=`<div class="changes"><h5>Key Changes</h5><ul>`;
          changes.forEach(c=>h+=`<li>${esc(c)}</li>`);
          h+=`</ul></div>`;
        }
        const mechs=(b.dominant_mechanisms||[]);
        if(mechs.length){
          h+=`<div class="changes"><h5>Dominant Mechanisms</h5><ul>`;
          mechs.forEach(m=>h+=`<li>${esc(m)}</li>`);
          h+=`</ul></div>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }

    // Domain analyses
    const domKeys=Object.keys(r.domain_analyses||{});
    if(domKeys.length){
      h+=`<hr class="div">`;
      h+=`<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:11px">Domain Analysis — Round ${r.number}</h3>`;
      h+=`<div class="dom-tabs">`;
      domKeys.forEach((dom,di)=>{
        const dc=domClass(dom);
        h+=`<button class="dom-tab${di===0?' a-'+dc:''}" data-domtabbtn="r${r.number}" onclick="showDomTab('r${r.number}','${dom}',this)">${esc(dom.charAt(0).toUpperCase()+dom.slice(1))}</button>`;
      });
      h+=`</div>`;
      domKeys.forEach((dom,di)=>{
        const dc=domClass(dom);
        const da=r.domain_analyses[dom];
        h+=`<div id="dt-r${r.number}-${dom}" data-domtab="r${r.number}" ${di>0?'style="display:none"':''}>`;
        h+=`<div class="dom-panel dom-${dc}">`;
        h+=`<h4>${esc(da.domain||dom)}</h4>`;
        if(da.impact_assessment){
          h+=`<div class="fld"><div class="fld-lbl">Impact Assessment</div><p>${esc(da.impact_assessment)}</p></div>`;
        }
        if(da.magnitude_estimate){
          h+=`<div class="fld"><div class="fld-lbl">Magnitude</div><p>${esc(da.magnitude_estimate)}</p></div>`;
        }
        if(da.uncertainty){
          const uc=uncClass(da.uncertainty);
          const ul=uncLabel(da.uncertainty);
          h+=`<div class="fld"><div class="fld-lbl">Uncertainty</div><span class="unc ${uc}">${ul}</span><p style="margin-top:5px">${esc(da.uncertainty)}</p></div>`;
        }
        if(da.conflicts_with_other_domains){
          h+=`<div class="fld"><div class="fld-lbl">Cross-Domain Conflicts</div><div class="conf-box">${esc(da.conflicts_with_other_domains)}</div></div>`;
        }
        h+=`</div></div>`;
      });
    }

    // Stakeholder deliberations
    const stakeholders=r.stakeholders||[];
    if(stakeholders.length){
      h+=`<hr class="div">`;
      h+=`<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:11px">Stakeholder Deliberations — Round ${r.number}</h3>`;
      h+=`<div class="sh-list">`;
      stakeholders.forEach((sh,si)=>{
        const bodyId=`sh-body-r${r.number}-${si}`;
        const chevId=`sh-chev-r${r.number}-${si}`;
        h+=`<div class="sh-card">`;
        h+=`<div class="sh-header" onclick="toggleSh('${bodyId}','${chevId}')">
          <div class="sh-title">
            <span class="sh-id">${esc(sh.agent_id)}</span>
            <span class="sh-role">${esc(sh.role)}</span>
          </div>
          <span class="sh-chevron" id="${chevId}">▼</span>
        </div>`;
        h+=`<div class="sh-body" id="${bodyId}">`;
        (sh.turns||[]).forEach(t=>{
          h+=`<div class="turn">
            <div class="turn-hdr">Turn ${t.turn_number}</div>
            <div class="turn-body">${esc(t.content||'')}</div>
          </div>`;
        });
        if(!(sh.turns||[]).length) h+=`<p style="color:var(--muted);font-size:13px;padding-top:10px">No turns recorded.</p>`;
        h+=`</div></div>`;
      });
      h+=`</div>`;
    }

    h+=`</div>`;
    container.insertAdjacentHTML('beforeend',h);
  });

})();

// ---------------------------------------------------------------------------
// Fork
// ---------------------------------------------------------------------------
(function renderFork(){
  if(!D.forks||!D.forks.length){
    document.getElementById('s-fork').innerHTML='<p style="color:var(--muted)">No fork runs found for this simulation.</p>';
    return;
  }

  const endYear=D.start_year+(D.resolution_years||5)*D.rounds_completed;
  const mainFinal=D.final_scenario||{};
  let h='';

  // Fork selector row (only when there are multiple fork runs)
  if(D.forks.length>1){
    h+=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">`;
    D.forks.forEach((f,fi)=>{
      const shortId=f.id.slice(-6);
      h+=`<button class="dom-tab${fi===0?' a-fork':''}" data-fk-btn="${fi}" onclick="showForkSel(${fi})">Fork ${fi+1} · ${esc(shortId)}</button>`;
    });
    h+=`</div>`;
  }

  D.forks.forEach((fork,fi)=>{
    const forkOverview=fork.overview||{};
    const forkFinal=forkOverview.final_scenario||{};
    const forkDetailRounds=(fork.rounds||[]).filter(r=>r.number>=fork.fork_round);

    h+=`<div id="fk-${fi}" data-fk${fi>0?' style="display:none"':''}>`;

    // Sub-nav: Fork Overview + one pill per fork round
    h+=`<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">`;
    h+=`<button class="dom-tab a-fork" data-fp-btn="fork-ov-${fi}" onclick="showFP(${fi},'fork-ov-${fi}')">Fork Overview</button>`;
    forkDetailRounds.forEach(r=>{
      h+=`<button class="dom-tab" data-fp-btn="frp-${fi}-${r.number}" onclick="showFP(${fi},'frp-${fi}-${r.number}')">${r.number===fork.fork_round?'↗ ':''}Round ${r.number}${r.year?' · '+r.year:''}</button>`;
    });
    h+=`</div>`;

    // ── Fork Overview panel ──────────────────────────────────────────────────
    h+=`<div id="fork-ov-${fi}" data-fp>`;
    h+=`<div class="fork-banner">
      <h3>Fork Run: ${esc(fork.id)}</h3>
      <p>Diverges at Round ${fork.fork_round} — takes the counterfactual branch: <em>${esc(fork.branch_resolution||fork.branch_axis||'')}</em></p>
    </div>`;

    h+=`<div class="two-path">`;
    h+=`<div class="path-card"><h3 style="color:var(--blue)">Main Run Path</h3>`;
    D.rounds.forEach(r=>{
      const sel=r.branches&&r.branches[r.selected_branch_index];
      h+=`<div class="path-step">
        <div class="step-year">Round ${r.number} · ${r.year} → ${r.year+(D.resolution_years||5)}</div>
        <div class="step-res">${esc(sel?shortLabel(sel.resolution,14):'—')}</div>
        <div class="step-axis">${esc(sel?sel.axis:'')}</div>
      </div>`;
    });
    h+=`</div>`;

    h+=`<div class="path-card"><h3 style="color:var(--purple)">Fork Run Path</h3>`;
    const forkLineage=(forkOverview.synthesis_lineage||[]);
    if(forkLineage.length){
      forkLineage.forEach(entry=>{
        const isShared=entry.round<fork.fork_round;
        const isForkPt=entry.round===fork.fork_round;
        const selRes=entry.selected_resolution||entry.selected_axis||'';
        h+=`<div class="path-step">
          <div class="step-year">Round ${entry.round} · ${entry.year}${isShared?' (shared)':''}${isForkPt?' <strong style="color:var(--purple)">[FORK POINT]</strong>':''}</div>
          <div class="step-res" style="color:${isForkPt?'var(--purple)':'var(--blue)'}">${esc(shortLabel(selRes,14))}</div>
          <div class="step-axis">${esc(entry.selected_axis||'')}</div>
        </div>`;
      });
    } else {
      h+=`<div class="path-step"><div class="step-year">Rounds 1–${fork.fork_round-1} (shared)</div><div class="step-res">Same as main run up to fork point</div></div>`;
      h+=`<div class="path-step"><div class="step-year">Round ${fork.fork_round} <strong style="color:var(--purple)">[FORK POINT]</strong></div>
        <div class="step-res" style="color:var(--purple)">${esc(shortLabel(fork.branch_resolution||'',14))}</div>
        <div class="step-axis">${esc(fork.branch_axis||'')}</div>
      </div>`;
    }
    h+=`</div></div>`;

    const mainNarr=mainFinal.narrative||((mainFinal.branches||[]).find(b=>b.selected)||{}).scenario_narrative||'';
    const forkNarr=forkFinal.narrative||((forkFinal.branches||[]).find(b=>b.selected)||{}).scenario_narrative||'';
    const mainConflicts=(mainFinal.unresolved_conflicts||[]);
    const forkConflicts=(forkFinal.unresolved_conflicts||[]);

    h+=`<div class="two-path">`;
    h+=`<div>
      <h3 style="font-size:14px;font-weight:700;margin-bottom:9px;color:var(--blue)">${endYear} Outcome — Main Run</h3>
      <div class="narr-box">${esc(mainNarr||'—')}</div>`;
    if(mainConflicts.length){
      h+=`<div style="margin-top:11px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px">Unresolved Conflicts</div><div class="pill-list">`;
      mainConflicts.forEach(c=>h+=`<span class="pill">${esc(c)}</span>`);
      h+=`</div></div>`;
    }
    h+=`</div>`;
    h+=`<div>
      <h3 style="font-size:14px;font-weight:700;margin-bottom:9px;color:var(--purple)">${endYear} Outcome — Fork Run</h3>
      <div class="narr-box fork">${esc(forkNarr||'—')}</div>`;
    if(forkConflicts.length){
      h+=`<div style="margin-top:11px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px">Unresolved Conflicts</div><div class="pill-list">`;
      forkConflicts.forEach(c=>h+=`<span class="pill">${esc(c)}</span>`);
      h+=`</div></div>`;
    }
    h+=`</div></div>`;

    if(mainNarr||forkNarr){
      const mainMechs=((mainFinal.branches||[]).find(b=>b.selected)||{}).dominant_mechanisms||[];
      const forkMechs=((forkFinal.branches||[]).find(b=>b.selected)||{}).dominant_mechanisms||[];
      const mainUncert=mainFinal.uncertainty_summary||((mainFinal.branches||[]).find(b=>b.selected)||{}).uncertainty_summary||'';
      const forkUncert=forkFinal.uncertainty_summary||((forkFinal.branches||[]).find(b=>b.selected)||{}).uncertainty_summary||'';
      h+=`<div class="card" style="margin-top:4px"><h3>Endpoint Comparison</h3>
        <table class="cmp-table">
          <tr><th></th><th class="main-col">Main Run (${endYear})</th><th class="fork-col">Fork Run (${endYear})</th></tr>`;
      if(mainConflicts.length||forkConflicts.length){
        h+=`<tr><td><strong>Key conflicts</strong></td>
          <td>${mainConflicts.slice(0,3).map(c=>`<div style="margin-bottom:3px">• ${esc(c)}</div>`).join('')}</td>
          <td>${forkConflicts.slice(0,3).map(c=>`<div style="margin-bottom:3px">• ${esc(c)}</div>`).join('')}</td>
        </tr>`;
      }
      if(mainMechs.length||forkMechs.length){
        h+=`<tr><td><strong>Dominant mechanisms</strong></td>
          <td>${mainMechs.slice(0,3).map(m=>`<div style="margin-bottom:3px">• ${esc(m)}</div>`).join('')}</td>
          <td>${forkMechs.slice(0,3).map(m=>`<div style="margin-bottom:3px">• ${esc(m)}</div>`).join('')}</td>
        </tr>`;
      }
      if(mainUncert||forkUncert){
        h+=`<tr><td><strong>Uncertainty summary</strong></td>
          <td><em>${esc(mainUncert.slice(0,200))}${mainUncert.length>200?'…':''}</em></td>
          <td><em>${esc(forkUncert.slice(0,200))}${forkUncert.length>200?'…':''}</em></td>
        </tr>`;
      }
      h+=`</table></div>`;
    }
    h+=`</div>`; // end fork-ov-{fi}

    // ── Per-fork-round panels ────────────────────────────────────────────────
    forkDetailRounds.forEach(r=>{
      const isForkPt=r.number===fork.fork_round;
      const selectedB=r.branches&&r.branches[r.selected_branch_index];
      const selAxis=selectedB?selectedB.axis:'';
      h+=`<div id="frp-${fi}-${r.number}" data-fp style="display:none">`;

      h+=`<div style="background:var(--purple-lt);border:1px solid #c4b5fd;border-radius:var(--r);padding:8px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px">
        <span style="background:var(--purple);color:white;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">FORK</span>
        <span style="font-size:12px;color:#4c1d95">Run: ${esc(fork.id)}${isForkPt?' · Divergence point':''}</span>
      </div>`;

      h+=`<div class="rnd-hdr">
        <span class="yr-badge" style="background:var(--purple)">${r.year||''}</span>
        <h2>Round ${r.number}</h2>
        <p style="color:var(--muted);font-size:13px;margin-top:4px">Uncertainty axis resolved: <strong>${esc(selAxis)}</strong></p>
      </div>`;

      if(r.key_decisions&&r.key_decisions.length){
        h+=`<div class="card"><h3>Key Decisions</h3><ul class="dec-list">`;
        r.key_decisions.forEach(d=>{
          h+=`<li class="dec-item">
            <div class="dec-id">${esc(d.id)}</div>
            <div class="dec-txt">${esc(d.description)}</div>
            <div class="dec-by">${esc(d.decided_by)}</div>
          </li>`;
        });
        h+=`</ul></div>`;
      }

      if(r.branches&&r.branches.length){
        h+=`<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:11px">Scenario Branches</h3>`;
        h+=`<div class="branches">`;
        r.branches.forEach((b,bi)=>{
          const cls=b.selected?'branch selected':'branch';
          const narId=`fnarr-${fi}-r${r.number}-b${bi}`;
          h+=`<div class="${cls}">`;
          if(b.selected)h+=`<span class="sel-badge">SELECTED ✓</span>`;
          h+=`<div class="bl ${b.selected?'bl-sel':'bl-alt'}">${b.selected?'Carried Forward':'Not Selected'}</div>`;
          h+=`<div class="b-axis">${esc(b.axis)}</div><div class="b-res">${esc(b.resolution)}</div>`;
          if(b.scenario_narrative){h+=`<div class="b-narr" id="${narId}">${esc(b.scenario_narrative)}</div><button class="exp-btn" onclick="toggleNarr('${narId}',this)">Read more ▾</button>`;}
          const changes=(b.key_changes||[]);
          if(changes.length){h+=`<div class="changes"><h5>Key Changes</h5><ul>`;changes.forEach(c=>h+=`<li>${esc(c)}</li>`);h+=`</ul></div>`;}
          const mechs=(b.dominant_mechanisms||[]);
          if(mechs.length){h+=`<div class="changes"><h5>Dominant Mechanisms</h5><ul>`;mechs.forEach(m=>h+=`<li>${esc(m)}</li>`);h+=`</ul></div>`;}
          h+=`</div>`;
        });
        h+=`</div>`;
      }

      const fDomKeys=Object.keys(r.domain_analyses||{});
      if(fDomKeys.length){
        const pfx=`fr${fi}r${r.number}`;
        h+=`<hr class="div">`;
        h+=`<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:11px">Domain Analysis — Round ${r.number}</h3>`;
        h+=`<div class="dom-tabs">`;
        fDomKeys.forEach((dom,di)=>{const dc=domClass(dom);h+=`<button class="dom-tab${di===0?' a-'+dc:''}" data-domtabbtn="${pfx}" onclick="showDomTab('${pfx}','${dom}',this)">${esc(dom.charAt(0).toUpperCase()+dom.slice(1))}</button>`;});
        h+=`</div>`;
        fDomKeys.forEach((dom,di)=>{
          const dc=domClass(dom);const da=r.domain_analyses[dom];
          h+=`<div id="dt-${pfx}-${dom}" data-domtab="${pfx}" ${di>0?'style="display:none"':''}><div class="dom-panel dom-${dc}"><h4>${esc(da.domain||dom)}</h4>`;
          if(da.impact_assessment)h+=`<div class="fld"><div class="fld-lbl">Impact Assessment</div><p>${esc(da.impact_assessment)}</p></div>`;
          if(da.magnitude_estimate)h+=`<div class="fld"><div class="fld-lbl">Magnitude</div><p>${esc(da.magnitude_estimate)}</p></div>`;
          if(da.uncertainty){const uc=uncClass(da.uncertainty);const ul=uncLabel(da.uncertainty);h+=`<div class="fld"><div class="fld-lbl">Uncertainty</div><span class="unc ${uc}">${ul}</span><p style="margin-top:5px">${esc(da.uncertainty)}</p></div>`;}
          if(da.conflicts_with_other_domains)h+=`<div class="fld"><div class="fld-lbl">Cross-Domain Conflicts</div><div class="conf-box">${esc(da.conflicts_with_other_domains)}</div></div>`;
          h+=`</div></div>`;
        });
      }

      const fShs=r.stakeholders||[];
      if(fShs.length){
        h+=`<hr class="div">`;
        h+=`<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:11px">Stakeholder Deliberations — Round ${r.number}</h3>`;
        h+=`<div class="sh-list">`;
        fShs.forEach((sh,si)=>{
          const bodyId=`fsh-body-${fi}-r${r.number}-${si}`;const chevId=`fsh-chev-${fi}-r${r.number}-${si}`;
          h+=`<div class="sh-card"><div class="sh-header" onclick="toggleSh('${bodyId}','${chevId}')"><div class="sh-title"><span class="sh-id">${esc(sh.agent_id)}</span><span class="sh-role">${esc(sh.role)}</span></div><span class="sh-chevron" id="${chevId}">▼</span></div>`;
          h+=`<div class="sh-body" id="${bodyId}">`;
          (sh.turns||[]).forEach(t=>{h+=`<div class="turn"><div class="turn-hdr">Turn ${t.turn_number}</div><div class="turn-body">${esc(t.content||'')}</div></div>`;});
          if(!(sh.turns||[]).length)h+=`<p style="color:var(--muted);font-size:13px;padding-top:10px">No turns recorded.</p>`;
          h+=`</div></div>`;
        });
        h+=`</div>`;
      }
      h+=`</div>`; // end frp-{fi}-{n}
    });

    h+=`</div>`; // end fk-{fi}
  });

  document.getElementById('s-fork').innerHTML=h;
})();
</script>
</body>
</html>
